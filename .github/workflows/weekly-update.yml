name: Weekly AI Paper Update

on:
  schedule:
    # Every Sunday at 01:00 UTC (09:00 Beijing time) — fetch only
    - cron: '0 1 * * 0'
  push:
    branches: [main]
    paths: ['assets/data.js', 'assets/index.html']
  workflow_dispatch:
    inputs:
      fetch_only:
        description: 'Only fetch papers (skip deploy)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Fetch papers.json (schedule + manual with fetch_only)
  fetch-papers:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.fetch_only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch papers
        working-directory: scripts
        run: python3 fetch_papers.py --top 20 --output papers.json

      - name: Commit papers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/papers.json
          git diff --cached --quiet || git commit -m "data: fetch papers $(date -u +%Y-%m-%d)"
          git push

  # Job 2: Deploy to Pages (on push to data.js/index.html, or manual without fetch_only)
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.fetch_only)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: assets

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4


      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
